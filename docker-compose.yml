services:
  # ─── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: wants-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wants}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wants_secret}
      POSTGRES_DB: ${POSTGRES_DB:-wants}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Postgres runs every .sql/.sh file in /docker-entrypoint-initdb.d
      # alphabetically the first time the data directory is empty.
      # Our migration files are timestamp-prefixed so they run in the
      # correct order on a fresh boot. To re-run from scratch, do:
      #   docker-compose down -v && docker-compose up
      - ./backend/scripts/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wants}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: wants-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (NestJS) ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: wants-backend
    restart: unless-stopped
    ports:
      - "3001:3000"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      PORT: 3000
      # Backend reads DB_* (see backend/src/modules/database/database.service.ts).
      # These override any DB_* values from backend/.env so Compose works out of the box.
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-wants}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-wants_secret}
      DB_NAME: ${POSTGRES_DB:-wants}
      # PlatformService (app-builder) requires its own TENANT_DB_* vars.
      # In the OSS Docker setup we just point them at the same Postgres so
      # contributors get a working stack without extra configuration.
      TENANT_DB_HOST: postgres
      TENANT_DB_PORT: 5432
      TENANT_DB_USER: ${POSTGRES_USER:-wants}
      TENANT_DB_PASSWORD: ${POSTGRES_PASSWORD:-wants_secret}
      TENANT_DB_NAME: ${POSTGRES_DB:-wants}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ./backend/src:/app/src
      - ./backend/test:/app/test
      # Bind-mount config files so edits on the host take effect
      # without rebuilding the image.
      - ./backend/tsconfig.json:/app/tsconfig.json
      - ./backend/tsconfig.build.json:/app/tsconfig.build.json
      - ./backend/nest-cli.json:/app/nest-cli.json
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Frontend (React + Vite) ──────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: wants-frontend
    restart: unless-stopped
    ports:
      # Vite is configured to listen on port 3000 inside the container.
      # We expose it on host port 5173 to keep the standard URL.
      - "5173:3000"
    environment:
      VITE_API_URL: http://localhost:3001
      VITE_WS_URL: ws://localhost:3001
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      # Bind-mount config files so edits on the host take effect
      # without rebuilding the image.
      - ./frontend/package.json:/app/package.json
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tailwind.config.ts:/app/tailwind.config.ts
      - ./frontend/postcss.config.js:/app/postcss.config.js
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/index.html:/app/index.html
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  # ─── Qdrant (Vector DB) ───────────────────────────────────
  # Uncomment to enable vector search capabilities
  # qdrant:
  #   image: qdrant/qdrant:v1.7.4
  #   container_name: wants-qdrant
  #   restart: unless-stopped
  #   ports:
  #     - "6333:6333"
  #     - "6334:6334"
  #   volumes:
  #     - qdrant_data:/qdrant/storage
  #   environment:
  #     QDRANT__SERVICE__GRPC_PORT: 6334

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_node_modules:
    driver: local
  frontend_node_modules:
    driver: local
  # qdrant_data:
  #   driver: local

networks:
  default:
    name: wants-network
