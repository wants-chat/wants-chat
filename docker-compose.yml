version: "3.9"

services:
  # ─── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: wants-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wants}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wants_secret}
      POSTGRES_DB: ${POSTGRES_DB:-wants}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wants}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: wants-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (NestJS) ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: wants-backend
    restart: unless-stopped
    ports:
      - "3001:3000"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${POSTGRES_USER:-wants}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-wants_secret}
      DATABASE_NAME: ${POSTGRES_DB:-wants}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ./backend/src:/app/src
      - ./backend/test:/app/test
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Frontend (React + Vite) ──────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: wants-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3001
      VITE_WS_URL: ws://localhost:3001
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  # ─── Qdrant (Vector DB) ───────────────────────────────────
  # Uncomment to enable vector search capabilities
  # qdrant:
  #   image: qdrant/qdrant:v1.7.4
  #   container_name: wants-qdrant
  #   restart: unless-stopped
  #   ports:
  #     - "6333:6333"
  #     - "6334:6334"
  #   volumes:
  #     - qdrant_data:/qdrant/storage
  #   environment:
  #     QDRANT__SERVICE__GRPC_PORT: 6334

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_node_modules:
    driver: local
  frontend_node_modules:
    driver: local
  # qdrant_data:
  #   driver: local

networks:
  default:
    name: wants-network
